databases:
  - name: remotehub-db
    databaseName: remotehub
    user: remotehub
    plan: free

services:
  - type: web
    name: remotehub-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: remotehub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENV
        value: production
      - key: USE_REDIS
        value: "false"
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: remotehub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false